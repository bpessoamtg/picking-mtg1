name: Verificar Planos de Carga

# Portugal = UTC+2 (verão) / UTC+1 (inverno)
# Horários locais desejados: 8:07, 10:07, 13:07, 15:07, 18:07
# Em UTC+2 (verão):  6:07, 8:07, 11:07, 13:07, 16:07
# Em UTC+1 (inverno): 7:07, 9:07, 12:07, 14:07, 17:07
# Usar tempos de verão (adianta/atrasa 1h em inverno)

on:
  schedule:
    - cron: '7 6 * * 1-5'
    - cron: '7 8 * * 1-5'
    - cron: '7 11 * * 1-5'
    - cron: '7 13 * * 1-5'
    - cron: '7 16 * * 1-5'
  workflow_dispatch:   # permite trigger manual

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install anthropic requests

      - name: Verificar planos de carga
        run: python scripts/verificar_planos.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MS_TENANT_ID:      ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:      ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:  ${{ secrets.MS_CLIENT_SECRET }}
          MS_REFRESH_TOKEN:  ${{ secrets.MS_REFRESH_TOKEN }}
          MS_USER_EMAIL:     ${{ secrets.MS_USER_EMAIL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
